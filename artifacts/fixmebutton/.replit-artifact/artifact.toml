kind = "web"
previewPath = "/"
title = "FixMeButton"
version = "1.0.0"
id = "artifacts/fixmebutton"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23736

[services.development]
run = "pnpm --filter @workspace/fixmebutton run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fixmebutton", "run", "build" ]
publicDir = "artifacts/fixmebutton/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23736"
BASE_PATH = "/"
